<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div th:fragment="sidebar(activeMenu)" class="sidebar">
        <div class="sidebar-header">
            <img th:src="@{/img/Gemini_Generated_Image_eu5nwveu5nwveu5n.png}" alt="Logo">
            <div class="sidebar-header-text">
                Dana Pensiun<br>PPIP-PUSRI
            </div>
        </div>
        
        <div class="sidebar-profile">
            <div class="profile-icon">
                <img th:if="${#authentication.principal.fotoProfil != null and !#authentication.principal.fotoProfil.isEmpty()}" 
                     th:src="@{/profile-picture}" 
                     alt="Profile" 
                     style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                <svg th:unless="${#authentication.principal.fotoProfil != null and !#authentication.principal.fotoProfil.isEmpty()}" 
                     xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="profile-info">
                Selamat datang<br>
                <span class="name" sec:authentication="principal.fullName">User</span><br>
                <span class="badge" th:text="'(' + ${#authentication.principal.badgeId} + ')'">(000000)</span>
            </div>
        </div>

        <div class="sidebar-dept">
            Sistem Informasi <br>
            <span class="role" sec:authentication="principal.roleName">Role</span>
        </div>

        <nav class="sidebar-nav">
            <a th:href="@{/}" class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                Dashboard
            </a>
            
            <!-- Dokumen: visible to ADMIN and SUPER_ADMIN -->
            <div sec:authorize="hasAnyRole('ADMIN', 'SUPER_ADMIN')">
                <a th:href="@{/dokumen}" class="nav-item" th:classappend="${activeMenu == 'dokumen'} ? 'active'">
                    Dokumen
                </a>
            </div>

            <!-- Permintaan Akses: visible to all authenticated users -->
            <a th:href="@{/akses/list}" class="nav-item" th:classappend="${activeMenu == 'akses'} ? 'active'">
                Permintaan Akses
            </a>
            
            <!-- Admin Panel: SUPER_ADMIN only -->
            <div sec:authorize="hasRole('SUPER_ADMIN')">
                <div class="nav-section">PENGATURAN</div>
                <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activeMenu == 'admin'} ? 'active'">
                    Admin Panel
                </a>
                <a th:href="@{/admin/changelog}" class="nav-item" th:classappend="${activeMenu == 'changelog'} ? 'active'">
                    Riwayat Sistem
                </a>
            </div>
            
            <div style="margin-top: auto;">
                <form th:action="@{/logout}" method="post" style="display: flex; justify-content: center; padding: 20px;">
                    <button type="submit" class="btn btn-danger" style="width: 100%; text-align: center; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer;" onclick="return confirm('Apakah Anda yakin ingin log out?');">
                        Log Out
                    </button>
                </form>
            </div>
        </nav>
    </div>
</body>
</html>
