<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div th:fragment="sidebar(activeMenu)" class="sidebar">
        <div class="sidebar-header">
            <img th:src="@{/img/Gemini_Generated_Image_eu5nwveu5nwveu5n.png}" alt="Logo">
            <div class="sidebar-header-text">
                Dana Pensiun<br>PPIP-PUSRI
            </div>
        </div>
        
        <div class="sidebar-profile">
            <div class="profile-icon">
                <img th:if="${#authentication.principal.fotoProfil != null and !#authentication.principal.fotoProfil.isEmpty()}" 
                     th:src="@{${#authentication.principal.fotoProfil}}" 
                     alt="Profile" 
                     style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                <svg th:unless="${#authentication.principal.fotoProfil != null and !#authentication.principal.fotoProfil.isEmpty()}" 
                     xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#004c97" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="profile-info">
                Selamat datang<br>
                <span class="name" sec:authentication="principal.fullName">User</span><br>
                <span class="badge" th:text="'(' + ${#authentication.principal.badgeId} + ')'">(000000)</span>
            </div>
        </div>

        <div class="sidebar-dept">
            Sistem Informasi <br>
            <span class="role" sec:authentication="principal.roleName">Role</span>
        </div>

        <nav class="sidebar-nav">
            <th:block th:if="${session.currentModule == null or session.currentModule == 'main'}">
                <a th:href="@{/}" class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                    Dashboard
                </a>
                <a th:href="@{/profile}" class="nav-item" th:classappend="${activeMenu == 'profile'} ? 'active'">
                    Profile
                </a>
            </th:block>
            
            <th:block th:if="${session.currentModule == 'cuti'}">
                <a th:href="@{/cuti}" class="nav-item" th:classappend="${activeMenu == 'cutidashboard'} ? 'active'">
                    Dashboard
                </a>
                <a th:href="@{/cuti/pengajuan}" class="nav-item" th:classappend="${activeMenu == 'pengajuancuti'} ? 'active'">
                    Pengajuan Cuti
                </a>
                <a th:href="@{/cuti/data}" class="nav-item" th:classappend="${activeMenu == 'datacuti'} ? 'active'">
                    Data Cuti
                </a>
            </th:block>
            
            <!-- Admin Panel: ADMIN only -->
            <div sec:authorize="hasRole('ADMIN')">
                <div class="nav-section">PENGATURAN</div>
                <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activeMenu == 'admin'} ? 'active'">
                    Admin Panel
                </a>
                <th:block th:if="${session.currentModule == 'cuti'}">
                    <a th:href="@{/admin/holidays}" class="nav-item" th:classappend="${activeMenu == 'admin_holidays'} ? 'active'">
                        Kelola Hari Libur
                    </a>
                </th:block>
            </div>
            
            <div style="margin-top: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;">
                <a th:if="${session.currentModule != null and session.currentModule != 'main'}" th:href="@{/}" class="btn" style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; text-align: center; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; text-decoration: none; box-sizing: border-box;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Back to Home
                </a>
                
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn btn-danger" style="width: 100%; text-align: center; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; background: #dc3545; color: white; border: none;" onclick="return confirm('Apakah Anda yakin ingin log out?');">
                        Log Out
                    </button>
                </form>
            </div>
        </nav>
    </div>
</body>
</html>
