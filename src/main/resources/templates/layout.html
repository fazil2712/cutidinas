<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (activeMenu, content)">
<head>
    <meta charset="UTF-8">
    <title>Dana Pensiun PPIP-PUSRI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #004c97;
            --text-color: #333;
            --bg-color: #f4f7fa;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header img {
            width: 35px;
            height: auto;
        }

        .sidebar-header-text {
            font-weight: 700;
            color: var(--primary-blue);
            font-size: 14px;
            line-height: 1.2;
        }

        .sidebar-profile {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-info {
            font-size: 12px;
            color: #64748b;
        }
        
        .profile-info .name {
            font-weight: 700;
            color: var(--primary-blue);
            font-size: 14px;
        }

        .sidebar-dept {
            padding: 15px 20px;
            font-size: 11px;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
        }

        .sidebar-dept .role {
            color: #f59e0b; /* Golden orange for roles like SUPER ADMIN */
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-top: 10px;
        }

        .nav-item {
            display: block;
            padding: 12px 20px;
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s, color 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: #f1f5f9;
        }

        .nav-item.active {
            background-color: #f1f5f9;
            color: var(--primary-blue);
            border-left-color: var(--primary-blue);
            font-weight: 600;
        }

        .nav-section {
            padding: 20px 20px 10px;
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.5px;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px 40px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }
        
        .card-title {
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .page-title {
            color: var(--primary-blue);
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #475569;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            background: #f8fafc;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            text-decoration: none;
        }
        .btn:hover {
            text-decoration: underline;
        }
        
        .btn-primary {
            background-color: #0f766e;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #115e59;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-edit {
            background-color: #3b82f6;
            color: white;
        }

        .btn-delete {
            background-color: #ef4444;
            color: white;
        }

        /* Table styles */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            text-align: left;
            padding: 12px 15px;
            font-size: 12px;
            color: #64748b;
            border-bottom: 2px solid #f1f5f9;
            font-weight: 600;
        }
        .table td {
            padding: 15px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #333;
        }
        .badge-role {
            background-color: #f1f5f9;
            color: #475569;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .flex-row {
            display: flex;
            gap: 20px;
        }
        .flex-col {
            flex: 1;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/sidebar :: sidebar(activeMenu=${activeMenu})}"></th:block>
    
    <div class="main-content">
        <th:block th:replace="${content}"></th:block>
    </div>
</body>
</html>
