<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(activeMenu='dashboard', content=~{::.page-content})}">
    <div class="page-content">

        <style>
            /* Hero banner */
            .portal-hero {
                background: linear-gradient(135deg, #002B5E 0%, #004c97 70%, #d4b533 100%);
                border-radius: 16px;
                padding: 40px;
                margin-bottom: 30px;
                position: relative;
                overflow: hidden;
                color: white;
            }

            .portal-hero::before {
                content: '';
                position: absolute;
                top: -60px;
                right: -60px;
                width: 300px;
                height: 300px;
                background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
                border-radius: 50%;
                pointer-events: none;
            }

            .portal-title {
                font-size: 36px;
                font-weight: 800;
                margin: 0 0 10px 0;
                letter-spacing: 2px;
                font-family: 'Inter', sans-serif;
            }

            .portal-subtitle {
                font-size: 16px;
                opacity: 0.9;
                margin: 0;
            }

            .services-header {
                font-size: 18px;
                font-weight: 700;
                color: #1a2e4a;
                margin-bottom: 5px;
            }

            .services-subheader {
                font-size: 13px;
                color: #64748b;
                margin-bottom: 25px;
            }

            .app-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 30px;
            }

            .app-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                width: 120px;
                text-align: center;
                transition: transform 0.2s;
            }

            .app-item:hover {
                transform: translateY(-5px);
            }

            .app-icon {
                width: 70px;
                height: 70px;
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            }

            .app-icon svg {
                width: 35px;
                height: 35px;
            }

            .app-name {
                font-size: 13px;
                font-weight: 600;
                color: #334155;
                line-height: 1.3;
            }

            /* Icon Gradients */
            .bg-cuti { background: linear-gradient(135deg, #3b82f6, #2563eb); }
            .bg-risk { background: linear-gradient(135deg, #f59e0b, #d97706); }
            .bg-dokumen { background: linear-gradient(135deg, #10b981, #059669); }
            .bg-dinas { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

        </style>

        <!-- ===== HERO BANNER ===== -->
        <div class="portal-hero">
            <h1 class="portal-title">DAPEN PPIP</h1>
            <p class="portal-subtitle">Aplikasi Digitalisasi Dana Pensiun PPIP-PUSRI</p>
        </div>

        <!-- ===== SMART SERVICES ===== -->
        <h2 class="services-header">Smart Services</h2>
        <p class="services-subheader">Aplikasi penunjang pekerjaan karyawan</p>

        <div class="app-grid">
            
            <a th:href="@{/cuti}" class="app-item">
                <div class="app-icon bg-cuti">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div class="app-name">Sistem Manajemen Cuti</div>
            </a>

            <a th:href="@{https://riskppip.app}" class="app-item">
                <div class="app-icon bg-risk">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <div class="app-name">Risk Management App</div>
            </a>

            <a th:href="@{https://gdpp.me}" class="app-item">
                <div class="app-icon bg-dokumen">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div class="app-name">Katalog Dokumen</div>
            </a>

            <a th:href="@{#}" class="app-item">
                <div class="app-icon bg-dinas">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <div class="app-name">Sistem Manajemen Dinas</div>
            </a>

        </div>

    </div>
</div>
</body>
</html>
