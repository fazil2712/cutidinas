<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(activeMenu='admin', content=~{::.page-content})}">
    <div class="page-content">
        
        <h1 class="page-title">Admin Panel</h1>
        
        <div th:if="${success}" style="background: #10b981; color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px;" th:text="${success}"></div>
        <div th:if="${error}" style="background: #ef4444; color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px;" th:text="${error}"></div>

        <!-- Register New Account -->
        <div class="card">
            <h3 class="card-title">Register New Account</h3>
            <form th:action="@{/admin/users/add}" method="post" th:object="${newUser}" enctype="multipart/form-data">
                <div class="flex-row">
                    <div class="flex-col">
                        <div class="form-group">
                            <label>Badge ID</label>
                            <input type="text" class="form-control" th:field="*{badgeid}" required>
                        </div>
                        <div class="form-group">
                            <label>Full Name (Nama)</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select name="role" class="form-control">
                                <option value="ROLE_USER">USER</option>
                                <option value="ROLE_ADMIN">ADMIN</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Profile Picture (Max 10MB)</label>
                            <input type="file" name="file" class="form-control" accept="image/*">
                        </div>
                    </div>
                    
                    <div class="flex-col">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                        <div class="form-group">
                            <label>Unit Kerja</label>
                            <input type="text" class="form-control" th:field="*{unitKerja}">
                        </div>
                        <div class="form-group">
                            <label>Tanggal Masuk</label>
                            <input type="date" class="form-control" th:field="*{tahunMasuk}" required>
                        </div>
                    </div>
                </div>
                
                
                
                <button type="submit" class="btn btn-primary" style="margin-top: 15px;">REGISTER USER</button>
            </form>
        </div>

        <!-- Manage Accounts -->
        <div class="card">
            <h3 class="card-title">Manage Accounts</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>Badge ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Unit Kerja</th>
                        <th>Join Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.badgeid}"></td>
                        <td th:text="${u.name}"></td>
                        <td>
                            <span class="badge-role" th:text="${#lists.contains(u.permissions, 'ROLE_ADMIN') ? 'ADMIN' : 'USER'}"></span>
                        </td>
                        <td th:text="${u.unitKerja}"></td>
                        <td th:text="${u.tahunMasuk}"></td>
                        <td>
                            <a th:href="@{/admin/users/edit/{id}(id=${u.badgeid})}" class="btn btn-sm btn-edit" style="text-decoration: none;">Edit</a>
                            
                            <form th:action="@{/admin/users/delete/{id}(id=${u.badgeid})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                <button type="submit" class="btn btn-sm btn-delete">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Manage Cuti -->
        <div class="card" style="margin-top: 20px;">
            <h3 class="card-title">Manage Cuti Records</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Badge ID</th>
                        <th>Jenis</th>
                        <th>Periode</th>
                        <th>Total Hari</th>
                        <th>Sisa Hari</th>
                        <th>Tgl Mulai</th>
                        <th>Tgl Akhir</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${cutis}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.badgeid}"></td>
                        <td th:text="${c.jenis}"></td>
                        <td th:text="${c.periode}"></td>
                        <td th:text="${c.totalHari}"></td>
                        <td th:text="${c.sisaHari}"></td>
                        <td th:text="${c.tanggalMulai}"></td>
                        <td th:text="${c.tanggalAkhir}"></td>
                        <td>
                            <a th:href="@{/admin/cuti/edit/{id}(id=${c.id})}" class="btn btn-sm btn-edit" style="text-decoration: none; padding: 4px 8px;">Edit</a>
                            
                            <form th:action="@{/admin/cuti/delete/{id}(id=${c.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this cuti record?');">
                                <button type="submit" class="btn btn-sm btn-delete" style="padding: 4px 8px;">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>
</div>
</body>
</html>
