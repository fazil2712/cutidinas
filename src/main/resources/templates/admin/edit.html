<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(activeMenu='admin', content=~{::.page-content})}">
    <div class="page-content">
        <h1 class="page-title">Edit Account</h1>
        <div class="card">
            <h3 class="card-title">Update User Details</h3>
            <form th:action="@{/admin/users/edit/{id}(id=${user.badgeid})}" method="post" th:object="${user}" enctype="multipart/form-data">
                <div class="flex-row">
                    <div class="flex-col">
                        <div class="form-group">
                            <label>Badge ID (Cannot be changed)</label>
                            <input type="text" class="form-control" th:field="*{badgeid}" readonly style="background: #e2e8f0;">
                        </div>
                        <div class="form-group">
                            <label>NIK</label>
                            <input type="text" class="form-control" th:field="*{nik}" required>
                        </div>
                        <div class="form-group">
                            <label>Full Name (Nama)</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select name="role" class="form-control">
                                <option value="ROLE_USER" th:selected="${currentRole == 'ROLE_USER'}">USER</option>
                                <option value="ROLE_ADMIN" th:selected="${currentRole == 'ROLE_ADMIN'}">ADMIN</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Profile Picture (Upload to update)</label>
                            <input type="file" name="file" class="form-control" accept="image/*">
                        </div>
                    </div>
                    
                    <div class="flex-col">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current password">
                        </div>
                        <div class="form-group">
                            <label>Unit Kerja</label>
                            <input type="text" class="form-control" th:field="*{unitKerja}">
                        </div>
                        <div class="form-group">
                            <label>Tanggal Masuk</label>
                            <input type="date" class="form-control" th:field="*{tahunMasuk}" required>
                        </div>
                    </div>
                </div>
                
                
                
                <button type="submit" class="btn btn-primary" style="margin-top: 15px;">SAVE CHANGES</button>
                <a th:href="@{/admin/users}" class="btn" style="background: #e2e8f0; color: #333; margin-left: 10px; text-decoration: none;">CANCEL</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
