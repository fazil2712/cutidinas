<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>
<div th:replace="~{layout :: layout(activeMenu='admin_holidays', content=~{::.page-content})}">
    <div class="page-content">
        <h1 class="page-title">Kelola Hari Libur</h1>
        
        <div th:if="${success}" style="background: #10b981; color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px;" th:text="${success}"></div>
        <div th:if="${error}" style="background: #ef4444; color: white; padding: 12px; border-radius: 6px; margin-bottom: 20px;" th:text="${error}"></div>
        
        <div class="card" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <p style="margin: 0; color: #475569; font-size: 14px; max-width: 600px;">
                Kelola hari libur nasional di sini. Hari libur akan dilewati saat menghitung hari kerja (Cuti Kecil) untuk pengajuan cuti.
                <br><strong>Klik pada tanggal mana saja</strong> untuk menambahkan hari libur manual, atau <strong>klik pada hari libur yang ada</strong> untuk menghapusnya.
            </p>
            <form th:action="@{/admin/holidays/sync}" method="post" style="margin: 0;">
                <button type="submit" class="btn" style="background: #3b82f6; color: white; display: flex; align-items: center; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
                    Sinkronisasi Google Calendar (Libur Nasional)
                </button>
            </form>
        </div>

        <div class="card">
            <div id='calendar'></div>
        </div>

        <!-- Hidden forms for JS interactions -->
        <form id="addHolidayForm" th:action="@{/admin/holidays/add}" method="post" style="display: none;">
            <input type="date" name="date" id="addDate">
            <input type="text" name="description" id="addDesc">
        </form>

        <form id="deleteHolidayForm" th:action="@{/admin/holidays/delete/placeholder}" method="post" style="display: none;">
            <!-- action will be set dynamically, but th:action ensures CSRF token is injected -->
        </form>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                var calendarEl = document.getElementById('calendar');
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,multiMonthYear'
                    },
                    eventSources: [
                        {
                            url: '/admin/holidays/api'
                        },
                        {
                            events: [
                                {
                                    id: 'weekend',
                                    title: 'Akhir Pekan',
                                    daysOfWeek: [0, 6], // Sunday=0, Saturday=6
                                    color: '#94a3b8',
                                    allDay: true,
                                    classNames: ['fc-weekend-event']
                                }
                            ]
                        }
                    ],
                    dateClick: function(info) {
                        var dayOfWeek = info.date.getDay();
                        if (dayOfWeek === 0 || dayOfWeek === 6) {
                            alert("Hari tersebut sudah merupakan hari libur (Akhir Pekan).");
                            return;
                        }
                        var desc = prompt("Masukkan deskripsi hari libur untuk " + info.dateStr + ":");
                        if (desc && desc.trim() !== '') {
                            document.getElementById('addDate').value = info.dateStr;
                            document.getElementById('addDesc').value = desc;
                            document.getElementById('addHolidayForm').submit();
                        }
                    },
                    eventClick: function(info) {
                        if (info.event.id === 'weekend') {
                            return; // Do nothing for weekends
                        }
                        if (confirm("Hapus hari libur: '" + info.event.title + "' pada tanggal " + info.event.startStr + "?")) {
                            var form = document.getElementById('deleteHolidayForm');
                            form.action = '/admin/holidays/delete/' + info.event.id;
                            form.submit();
                        }
                    }
                });
                calendar.render();
            });
        </script>
        
        <style>
            #calendar {
                max-width: 100%;
                margin: 0 auto;
                font-family: 'Inter', sans-serif;
            }
            .fc-event {
                cursor: pointer;
            }
            .fc-weekend-event {
                cursor: default !important;
            }
            .fc-toolbar-title {
                font-size: 1.25em !important;
                color: #1a2e4a;
            }
            .fc-button-primary {
                background-color: #f1f5f9 !important;
                border-color: #cbd5e1 !important;
                color: #334155 !important;
                text-shadow: none !important;
                box-shadow: none !important;
            }
            .fc-button-active {
                background-color: #e2e8f0 !important;
            }
            .fc-button-primary:hover {
                background-color: #e2e8f0 !important;
            }
        </style>
    </div>
</div>
</body>
</html>
